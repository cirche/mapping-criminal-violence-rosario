      <path d="M70 20 V850 M110 20 V850 M150 20 V850 M190 20 V850 M230 20 V850 M270 20 V850 M310 20 V850 M350 20 V850 M390 20 V850 M430 20 V850 M470 20 V850 M510 20 V850 M550 20 V850 M590 20 V850 M630 20 V850 M670 20 V850 M710 20 V850 M750 20 V850 M790 20 V850 M830 20 V850 M870 20 V850 M910 20 V850 M950 20 V850 M990 20 V850 M1030 20 V850 M1070 20 V850 M1110 20 V850 M1150 20 V850 M1190 20 V850 M1230 20 V850 M1270 20 V850 M1310 20 V850"/>
    </g>

    <!-- irregular western / northern edges -->
    <g stroke-width="0.8" opacity="0.38">
      <path d="M0 60 L180 95 L260 40 L390 75 L510 42 L650 70 L800 38 L980 65 L1150 30"/>
      <path d="M15 835 L190 790 L330 822 L510 770 L700 805 L875 748 L1040 778 L1210 720"/>
      <path d="M0 250 L120 280 L250 258 L390 300 L520 282 L700 330 L850 305 L1040 350 L1230 330"/>
      <path d="M0 610 C185 570 345 545 520 565 S805 670 995 690 S1210 620 1380 630" stroke-width="3.6" opacity="0.45"/>
      <path d="M210 850 C330 700 475 610 610 430 S750 180 900 0" stroke-width="4.2" opacity="0.5"/>
      <path d="M0 385 C260 360 460 380 650 330 S930 240 1120 255 S1300 310 1450 292" stroke-width="5.2" opacity="0.58"/>
    </g>
  </g>

  <!-- Paraná river / waterfront: the key Rosario identity -->
  <path d="M1115 -30 C1072 78 1100 160 1188 238 C1280 318 1392 340 1434 457 C1482 592 1388 704 1354 812 C1330 888 1438 925 1620 925 L1620 -30 Z" fill="#000" opacity="0.96"/>
  <path d="M1118 -5 C1088 90 1116 166 1194 235 C1288 318 1395 346 1422 458 C1452 590 1378 700 1352 807" fill="none" stroke="#ffffff" stroke-width="5" stroke-opacity="0.46" filter="url(#glow)"/>
  <path d="M1180 30 C1260 95 1350 140 1600 150" fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.18"/>
  <path d="M1220 780 C1330 760 1445 800 1600 828" fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.16"/>

  <!-- eastern Rosario / violence layer -->
  <rect width="1600" height="900" fill="url(#redCore)"/>
  <g transform="translate(690 180) rotate(-1 300 250)" fill="none" stroke="#c1121f" stroke-width="1.2" opacity="0.72">
    <path d="M0 0 H610 M0 28 H630 M0 56 H648 M0 84 H660 M0 112 H665 M0 140 H667 M0 168 H660 M0 196 H648 M0 224 H632 M0 252 H610 M0 280 H580 M0 308 H545 M0 336 H505 M0 364 H455 M0 392 H395 M0 420 H320"/>
    <path d="M0 0 V430 M28 0 V448 M56 0 V460 M84 0 V470 M112 0 V476 M140 0 V482 M168 0 V486 M196 0 V490 M224 0 V492 M252 0 V492 M280 0 V488 M308 0 V480 M336 0 V470 M364 0 V456 M392 0 V438 M420 0 V416 M448 0 V390 M476 0 V360 M504 12 V328 M532 26 V292 M560 45 V252 M588 70 V208 M616 98 V160"/>
