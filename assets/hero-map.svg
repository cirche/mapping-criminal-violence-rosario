<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.78" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.22"/></feComponentTransfer>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="1.4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="edgeFade" x1="0" x2="1">
      <stop offset="0" stop-color="#000" stop-opacity="0.1"/>
      <stop offset="0.58" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.92"/>
    </linearGradient>
    <radialGradient id="redWash" cx="70%" cy="55%" r="42%">
      <stop offset="0" stop-color="#c1121f" stop-opacity="0.42"/>
      <stop offset="0.42" stop-color="#c1121f" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#c1121f" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="#020202"/>
  <rect width="1600" height="900" filter="url(#grain)" opacity="0.75"/>

  <!-- black satellite texture -->
  <g opacity="0.22" fill="#fff">
    <path d="M20 40 C140 90 240 15 330 90 C440 175 565 110 690 165 C825 225 905 170 1030 235 C1160 305 1270 245 1390 310 C1480 360 1535 340 1600 370 L1600 0 L20 0 Z" opacity="0.08"/>
    <path d="M0 760 C150 720 250 790 380 725 C520 655 640 725 790 670 C930 620 1030 690 1160 640 C1340 570 1470 620 1600 565 L1600 900 L0 900 Z" opacity="0.10"/>
  </g>

  <!-- white city grid, denser and more map-like -->
  <g stroke="#f2f2ef" stroke-width="1.05" fill="none" opacity="0.72" filter="url(#softGlow)">
    <g transform="translate(40 -5) rotate(-1.2 720 420)">
      <path d="M40 60 H1140 M35 92 H1168 M30 124 H1194 M25 156 H1220 M20 188 H1242 M16 220 H1260 M14 252 H1280 M12 284 H1300 M10 316 H1320 M8 348 H1340 M6 380 H1360 M4 412 H1380 M2 444 H1395 M0 476 H1410 M0 508 H1420 M0 540 H1430 M0 572 H1440 M0 604 H1450 M0 636 H1460 M0 668 H1470 M0 700 H1480 M0 732 H1490 M0 764 H1500 M0 796 H1510"/>
      <path d="M72 40 V820 M112 36 V820 M152 32 V820 M192 28 V820 M232 24 V820 M272 20 V820 M312 18 V820 M352 16 V820 M392 14 V820 M432 12 V820 M472 10 V820 M512 8 V820 M552 6 V820 M592 4 V820 M632 2 V820 M672 0 V820 M712 0 V820 M752 0 V820 M792 0 V820 M832 0 V820 M872 0 V820 M912 0 V820 M952 0 V820 M992 0 V820 M1032 0 V820 M1072 0 V820 M1112 0 V820 M1152 0 V820 M1192 0 V820 M1232 0 V820 M1272 0 V820 M1312 0 V820 M1352 0 V820"/>
    </g>
  </g>

  <!-- broken secondary streets -->
  <g stroke="#ffffff" stroke-width="0.75" fill="none" opacity="0.33">
    <path d="M95 90 L260 210 L450 235 L620 315 L820 320 L1030 405 L1290 398"/>
    <path d="M60 230 L240 245 L315 320 L510 370 L690 460 L890 455 L1160 540 L1510 520"/>
    <path d="M180 770 L250 590 L410 530 L540 430 L760 385 L915 260 L1110 210"/>
    <path d="M0 640 C180 600 345 560 510 575 S760 680 940 710 S1210 620 1500 625" stroke-width="3.2" opacity="0.42"/>
    <path d="M0 350 C230 340 410 365 610 320 S860 250 1070 250 S1340 320 1600 290" stroke-width="4" opacity="0.48"/>
    <path d="M430 900 C515 720 600 560 660 390 S730 165 835 0" stroke-width="4" opacity="0.45"/>
  </g>

  <!-- red eastern/downtown overlay, grid rather than huge circles -->
  <rect width="1600" height="900" fill="url(#redWash)"/>
  <g stroke="#c1121f" stroke-width="1.05" fill="none" opacity="0.62">
    <g transform="translate(690 190) rotate(1)">
      <path d="M0 0 H640 M0 24 H650 M0 48 H660 M0 72 H665 M0 96 H670 M0 120 H668 M0 144 H662 M0 168 H656 M0 192 H640 M0 216 H618 M0 240 H596 M0 264 H570 M0 288 H540 M0 312 H500 M0 336 H465 M0 360 H420 M0 384 H375 M0 408 H315"/>
      <path d="M0 0 V410 M24 0 V428 M48 0 V440 M72 0 V448 M96 0 V454 M120 0 V462 M144 0 V468 M168 0 V472 M192 0 V478 M216 0 V482 M240 0 V484 M264 0 V480 M288 0 V474 M312 0 V468 M336 0 V458 M360 0 V448 M384 0 V434 M408 0 V416 M432 0 V396 M456 0 V372 M480 0 V344 M504 0 V316 M528 10 V286 M552 20 V254 M576 32 V220 M600 48 V184 M624 66 V145"/>
    </g>
  </g>

  <!-- river/dark waterfront -->
  <path d="M1115 -20 C1055 105 1125 205 1240 285 C1360 370 1375 505 1320 642 C1270 765 1315 840 1435 920 L1620 920 L1620 -20 Z" fill="#000" opacity="0.76"/>
  <path d="M1135 0 C1090 108 1145 205 1250 278 C1368 360 1380 500 1330 635 C1285 760 1325 840 1450 900" stroke="#f4f4f0" stroke-opacity="0.35" stroke-width="4" fill="none"/>

  <!-- organic red stains / hotspots: smaller, more scattered -->
  <g fill="#c1121f" opacity="0.72" filter="url(#softGlow)">
    <circle cx="945" cy="382" r="44" opacity="0.34"/>
    <circle cx="1045" cy="520" r="70" opacity="0.28"/>
    <circle cx="1145" cy="430" r="36" opacity="0.32"/>
    <circle cx="825" cy="590" r="28" opacity="0.46"/>
    <circle cx="755" cy="345" r="22" opacity="0.5"/>
    <circle cx="685" cy="645" r="18" opacity="0.44"/>
    <circle cx="612" cy="455" r="15" opacity="0.44"/>
    <circle cx="1260" cy="610" r="22" opacity="0.48"/>
    <circle cx="1370" cy="760" r="21" opacity="0.45"/>
    <circle cx="1490" cy="520" r="12" opacity="0.55"/>
    <circle cx="1215" cy="205" r="12" opacity="0.42"/>
    <circle cx="970" cy="250" r="10" opacity="0.55"/>
    <circle cx="880" cy="735" r="13" opacity="0.55"/>
  </g>

  <!-- vignette -->
  <rect width="1600" height="900" fill="url(#edgeFade)"/>
  <rect width="1600" height="900" fill="#000" opacity="0.08"/>
</svg>