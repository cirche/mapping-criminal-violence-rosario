<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="3"/><feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="table" tableValues="0 0.18"/></feComponentTransfer></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="1.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="leftFade" x1="0" x2="1"><stop offset="0" stop-color="#000" stop-opacity="0.18"/><stop offset="0.45" stop-color="#000" stop-opacity="0"/><stop offset="1" stop-color="#000" stop-opacity="0.72"/></linearGradient>
    <radialGradient id="redCore" cx="69%" cy="53%" r="36%"><stop offset="0" stop-color="#c1121f" stop-opacity="0.46"/><stop offset="0.45" stop-color="#c1121f" stop-opacity="0.24"/><stop offset="1" stop-color="#c1121f" stop-opacity="0"/></radialGradient>
  </defs>

  <rect width="1600" height="900" fill="#020202"/>
  <rect width="1600" height="900" filter="url(#grain)" opacity="0.9"/>

  <!-- Rosario: compact orthogonal urban grid -->
  <g transform="translate(40 -35) rotate(-1.6 760 450)" fill="none" stroke="#ffffff" stroke-linecap="square" filter="url(#glow)">
    <g stroke-width="1.25" opacity="0.84">
