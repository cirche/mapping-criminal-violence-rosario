  <g fill="#c1121f" opacity="0.78" filter="url(#glow)">
    <circle cx="1008" cy="430" r="56" opacity="0.38"/>
    <circle cx="1112" cy="535" r="84" opacity="0.30"/>
    <circle cx="930" cy="585" r="35" opacity="0.48"/>
    <circle cx="815" cy="470" r="24" opacity="0.52"/>
    <circle cx="760" cy="625" r="22" opacity="0.46"/>
    <circle cx="1050" cy="300" r="20" opacity="0.54"/>
    <circle cx="1228" cy="625" r="26" opacity="0.48"/>
    <circle cx="1370" cy="745" r="24" opacity="0.42"/>
    <circle cx="1465" cy="520" r="15" opacity="0.5"/>
    <circle cx="1180" cy="185" r="13" opacity="0.5"/>
  </g>

  <!-- vignette and readability -->
  <rect width="1600" height="900" fill="url(#leftFade)"/>
  <rect width="1600" height="900" fill="#000" opacity="0.12"/>
</svg>