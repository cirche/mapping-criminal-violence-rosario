<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #0b0b0b;
      color: white;
    }

    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      background-color: #0b0b0b;
      display: flex;
      justify-content: center;
      padding: 15px;
      z-index: 1000;
    }

    .nav-links {
      display: flex;
      gap: 25px;
    }

    .nav-links a {
      color: #ccc;
      text-decoration: none;
    }

    .content {
      margin-top: 80px;
      padding: 30px;
    }

    #map {
      height: 600px;
      margin-top: 20px;
    }

    select {
      margin-top: 20px;
      padding: 8px;
      background: #111;
      color: white;
      border: 1px solid #333;
    }

    /* 🔥 LEGENDA */
    .legend {
      position: absolute;
      bottom: 30px;
      right: 30px;
      background: rgba(0,0,0,0.9);
      padding: 15px;
      border: 1px solid #333;
      font-size: 0.9rem;
    }

    .legend div {
      margin-bottom: 5px;
    }

    .box {
      display: inline-block;
      width: 12px;
      height: 12px;
      margin-right: 8px;
    }

    .red { background: #c1121f; }
    .orange { background: #f4a261; }
    .blue { background: #457b9d; }
  </style>
</head>

<body>
  <nav class="navbar">
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="map.html">Interactive Map</a>
      <a href="data.html">Data</a>
      <a href="methodology.html">Methodology</a>
      <a href="rosario.html">Rosario Analysis</a>
      <a href="about.html">Profile</a>
    </div>
  </nav>

  <div class="content">
    <h1>Interactive Map</h1>

    <select id="yearFilter">
      <option value="all">All Years</option>
      <option value="2025">2025</option>
      <option value="2024">2024</option>
      <option value="2023">2023</option>
      <option value="2022">2022</option>
    </select>

    <div id="map"></div>
  </div>

  <!-- 🔥 LEGENDA -->
  <div class="legend">
    <div><span class="box red"></span>Civilian targeting</div>
    <div><span class="box orange"></span>Violence / attack</div>
    <div><span class="box blue"></span>Other</div>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script>
    var map = L.map('map').setView([-32.95, -60.66], 12);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    var redIcon = new L.Icon({
      iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
      shadowUrl: 'https://unpkg.com/leaflet/dist/images/marker-shadow.png'
    });

    var orangeIcon = new L.Icon({
      iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-orange.png',
      shadowUrl: 'https://unpkg.com/leaflet/dist/images/marker-shadow.png'
    });

    var blueIcon = new L.Icon({
      iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-blue.png',
      shadowUrl: 'https://unpkg.com/leaflet/dist/images/marker-shadow.png'
    });

    function getIcon(event) {
      if (event.description.toLowerCase().includes("civil")) return redIcon;
      if (event.description.toLowerCase().includes("attack")) return orangeIcon;
      return blueIcon;
    }

    var markers = [];

    function loadMarkers(data, year) {
      markers.forEach(m => map.removeLayer(m));
      markers = [];

      data.forEach(event => {
        if (year === "all" || event.year === year) {
          var marker = L.marker([event.lat, event.lng], {
            icon: getIcon(event)
          }).addTo(map);

          marker.bindPopup(event.description + "<br>" + event.year);
          markers.push(marker);
        }
      });
    }

    fetch("data.json")
      .then(res => res.json())
      .then(data => {
        loadMarkers(data, "all");

        document.getElementById("yearFilter").addEventListener("change", function() {
          loadMarkers(data, this.value);
        });
      });
  </script>
</body>
</html>
