<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #0b0b0b;
      color: white;
    }

    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      background-color: #0b0b0b;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 15px 40px;
      z-index: 1000;
      box-sizing: border-box;
    }

    .nav-links {
      list-style: none;
      display: flex;
      gap: 25px;
      margin: 0;
      padding: 0;
    }

    .nav-links a {
      color: #ccc;
      text-decoration: none;
      font-size: 0.9rem;
    }

    .nav-links a:hover {
      color: #c1121f;
    }

    .content {
      margin-top: 80px;
      padding: 30px;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    p {
      color: #ccc;
      max-width: 800px;
      line-height: 1.6;
    }

    #map {
      height: 600px;
      width: 100%;
      margin-top: 30px;
      border: 1px solid #333;
    }

    select {
      margin-top: 20px;
      padding: 8px;
      background: #111;
      color: white;
      border: 1px solid #333;
    }
  </style>
</head>

<body>
  <nav class="navbar">
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="map.html">Interactive Map</a></li>
      <li><a href="data.html">Data & Visualisations</a></li>
      <li><a href="methodology.html">Methodology</a></li>
      <li><a href="rosario.html">Rosario Analysis</a></li>
      <li><a href="about.html">Research Profile</a></li>
    </ul>
  </nav>

  <main class="content">
    <h1>Interactive Map</h1>
    <p>
      Explore georeferenced events of criminal violence in Rosario.
      Use the filter to visualise events by year.
    </p>

    <label for="yearFilter">Select Year:</label>
    <select id="yearFilter">
      <option value="all">All Years</option>
      <option value="2025">2025</option>
      <option value="2024">2024</option>
      <option value="2023">2023</option>
      <option value="2022">2022</option>
    </select>

    <div id="map"></div>
  </main>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script>
    var map = L.map('map').setView([-32.95, -60.66], 12);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    var markers = [];

    function getColor(type) {
      if (type === "homicide") return "#c1121f";       // rosso
      if (type === "violence") return "#f4a261";       // arancione
      return "#457b9d";                                // blu
    }

    function loadMarkers(data, year) {
      markers.forEach(m => map.removeLayer(m));
      markers = [];

      data.forEach(event => {
        if (year === "all" || event.year === year) {

          var size = 5 + (event.fatalities * 3);
          var color = getColor(event.type);

          var circle = L.circleMarker([event.lat, event.lng], {
            radius: size,
            color: color,
            fillColor: color,
            fillOpacity: 0.7,
            weight: 1
          })
          .addTo(map)
          .bindPopup(
            "<b>" + event.description + "</b><br>" +
            "Year: " + event.year + "<br>" +
            "Fatalities: " + event.fatalities + "<br>" +
            "Type: " + event.type
          );

          markers.push(circle);
        }
      });
    }

    fetch("data.json")
      .then(response => response.json())
      .then(data => {
        loadMarkers(data, "all");

        document.getElementById("yearFilter").addEventListener("change", function() {
          loadMarkers(data, this.value);
        });
      });
  </script>
</body>
</html>
