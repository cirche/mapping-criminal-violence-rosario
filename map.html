<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #0b0b0b;
      color: white;
    }

    .content {
      margin-top: 80px;
      padding: 30px;
    }

    #map {
      height: 650px;
      margin-top: 20px;
    }

    .controls {
      margin-top: 20px;
      display: flex;
      gap: 15px;
      align-items: center;
    }

    select, button {
      padding: 8px;
      background: #111;
      color: white;
      border: 1px solid #333;
      cursor: pointer;
    }

    .active {
      background: #c1121f;
    }
  </style>
</head>

<body>

<div class="content">
  <h1>Interactive Map</h1>

  <div class="controls">
    <select id="yearFilter">
      <option value="all">All Years</option>
      <option value="2025">2025</option>
      <option value="2024">2024</option>
      <option value="2023">2023</option>
      <option value="2022">2022</option>
    </select>

    <button id="markerBtn" class="active">Markers</button>
    <button id="heatBtn">Heatmap</button>
  </div>

  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<script>
  var map = L.map('map').setView([-32.95, -60.66], 11);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  var markerCluster = L.markerClusterGroup({
    spiderfyOnMaxZoom: false
  });

  var heatLayer = L.heatLayer([], { radius: 25 });

  map.addLayer(markerCluster);

  var allData = [];
  var mode = "markers";

  function loadData(year) {
    markerCluster.clearLayers();
    heatLayer.setLatLngs([]);

    var heatPoints = [];

    allData.forEach(event => {
      if (!event.lat || !event.lng) return;

      if (year === "all" || String(event.year) === year) {

        if (mode === "markers") {
          var marker = L.marker([event.lat, event.lng])
            .bindPopup(event.description || "No description");

          markerCluster.addLayer(marker);
        }

        if (mode === "heat") {
          heatPoints.push([event.lat, event.lng, event.fatalities || 1]);
        }
      }
    });

    if (mode === "heat") {
      heatLayer.setLatLngs(heatPoints);
      map.addLayer(heatLayer);
    } else {
      map.removeLayer(heatLayer);
    }
  }

  fetch("data.json")
    .then(res => res.json())
    .then(data => {
      allData = data;
      loadData("all");

      document.getElementById("yearFilter").addEventListener("change", function() {
        loadData(this.value);
      });
    });

  document.getElementById("markerBtn").onclick = function() {
    mode = "markers";
    this.classList.add("active");
    heatBtn.classList.remove("active");
    loadData(document.getElementById("yearFilter").value);
  };

  document.getElementById("heatBtn").onclick = function() {
    mode = "heat";
    this.classList.add("active");
    markerBtn.classList.remove("active");
    loadData(document.getElementById("yearFilter").value);
  };
</script>

</body>
</html>
