<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #0b0b0b;
      color: white;
    }

    .content {
      padding: 30px;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    p {
      color: #ccc;
      max-width: 850px;
      line-height: 1.6;
    }

    .controls {
      margin-top: 20px;
      display: flex;
      gap: 15px;
      align-items: center;
      flex-wrap: wrap;
    }

    select, button {
      padding: 8px 12px;
      background: #111;
      color: white;
      border: 1px solid #333;
      cursor: pointer;
    }

    .active {
      background: #c1121f;
      border-color: #c1121f;
    }

    .counter {
      color: #ccc;
      font-size: 0.95rem;
    }

    .legend {
      margin-top: 15px;
      background: #111;
      border: 1px solid #333;
      padding: 12px;
      max-width: 360px;
      font-size: 0.9rem;
      color: #ccc;
    }

    .gradient-bar {
      height: 12px;
      margin: 8px 0;
      background: linear-gradient(to right, blue, lime, yellow, orange, red);
    }

    .legend-scale {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: #aaa;
    }

    #map {
      height: 650px;
      margin-top: 20px;
      border: 1px solid #333;
    }
  </style>
</head>

<body>

<div class="content">
  <h1>Interactive Map</h1>
  <p>
    Explore georeferenced events of criminal violence. Use the controls to switch
    between clustered event markers and heatmap concentration.
  </p>

  <div class="controls">
    <label for="yearFilter">Select Year:</label>
    <select id="yearFilter">
      <option value="all">All Years</option>
      <option value="2025">2025</option>
      <option value="2024">2024</option>
      <option value="2023">2023</option>
      <option value="2022">2022</option>
    </select>

    <button id="markerBtn" class="active">Markers</button>
    <button id="heatBtn">Heatmap</button>

    <span class="counter" id="counter">Events displayed: 0</span>
  </div>

  <div class="legend" id="heatLegend" style="display: none;">
    <strong>Heatmap intensity</strong>
    <div class="gradient-bar"></div>
    <div class="legend-scale">
      <span>Lower concentration</span>
      <span>Higher concentration</span>
    </div>
  </div>

  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<script>
  var map = L.map('map').setView([-32.95, -60.66], 11);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  var markerCluster = L.markerClusterGroup({
    spiderfyOnMaxZoom: false,
    zoomToBoundsOnClick: true,
    showCoverageOnHover: false,
    maxClusterRadius: 45
  });

  map.addLayer(markerCluster);

  var heatLayer = null;
  var currentHeatPoints = [];
  var allData = [];
  var mode = "markers";

  function getHeatOptions() {
    var zoom = map.getZoom();

    if (zoom >= 14) {
      return {
        radius: 12,
        blur: 8,
        maxZoom: 17,
        minOpacity: 0.25,
        gradient: {
          0.20: "blue",
          0.40: "lime",
          0.60: "yellow",
          0.80: "orange",
          1.00: "red"
        }
      };
    }

    if (zoom >= 12) {
      return {
        radius: 18,
        blur: 12,
        maxZoom: 16,
        minOpacity: 0.25,
        gradient: {
          0.20: "blue",
          0.40: "lime",
          0.60: "yellow",
          0.80: "orange",
          1.00: "red"
        }
      };
    }

    return {
      radius: 28,
      blur: 18,
      maxZoom: 14,
      minOpacity: 0.30,
      gradient: {
        0.20: "blue",
        0.40: "lime",
        0.60: "yellow",
        0.80: "orange",
        1.00: "red"
      }
    };
  }

  function refreshHeatLayer() {
    if (heatLayer) {
      map.removeLayer(heatLayer);
    }

    heatLayer = L.heatLayer(currentHeatPoints, getHeatOptions());
    map.addLayer(heatLayer);
  }

  function loadData(year) {
    markerCluster.clearLayers();
    currentHeatPoints = [];

    var displayed = 0;
    var bounds = [];

    allData.forEach(function(event) {
      var lat = Number(event.lat);
      var lng = Number(event.lng);
      var fatalities = Number(event.fatalities) || 1;

      if (!lat || !lng || !event.year) return;

      if (year === "all" || String(event.year) === String(year)) {
        displayed++;
        bounds.push([lat, lng]);

        if (mode === "markers") {
          var marker = L.marker([lat, lng])
            .bindPopup(
              "<strong>" + (event.description || "No description available") + "</strong><br>" +
              "Year: " + event.year + "<br>" +
              "Fatalities: " + fatalities + "<br>" +
              "Type: " + (event.type || "N/A")
            );

          markerCluster.addLayer(marker);
        }

        if (mode === "heat") {
          currentHeatPoints.push([lat, lng, Math.min(fatalities, 3)]);
        }
      }
    });

    document.getElementById("counter").innerText = "Events displayed: " + displayed;

    if (mode === "heat") {
      map.removeLayer(markerCluster);
      refreshHeatLayer();
      document.getElementById("heatLegend").style.display = "block";
    } else {
      if (heatLayer) {
        map.removeLayer(heatLayer);
      }
      map.addLayer(markerCluster);
      document.getElementById("heatLegend").style.display = "none";
    }

    if (bounds.length > 0 && year !== "all") {
      map.fitBounds(bounds, {
        padding: [30, 30],
        maxZoom: 12
      });
    }
  }

  fetch("data.json")
    .then(res => res.json())
    .then(data => {
      allData = data;
      loadData("all");

      document.getElementById("yearFilter").addEventListener("change", function() {
        loadData(this.value);
      });
    });

  document.getElementById("markerBtn").onclick = function() {
    mode = "markers";
    this.classList.add("active");
    document.getElementById("heatBtn").classList.remove("active");
    loadData(document.getElementById("yearFilter").value);
  };

  document.getElementById("heatBtn").onclick = function() {
    mode = "heat";
    this.classList.add("active");
    document.getElementById("markerBtn").classList.remove("active");
    loadData(document.getElementById("yearFilter").value);
  };

  map.on("zoomend", function() {
    if (mode === "heat") {
      refreshHeatLayer();
    }
  });
</script>

</body>
</html>
