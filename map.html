<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />
  <link rel="stylesheet" href="map.css" />
</head>

<body>
  <div class="content">
    <h1>Interactive Map</h1>
    <p>
      Explore georeferenced events of criminal violence. Use the controls to switch
      between clustered event markers, heatmap concentration, and neighbourhood-level density.
    </p>

    <div class="controls">
      <label for="yearFilter">Select Year:</label>
      <select id="yearFilter">
        <option value="all">All Years</option>
        <option value="2025">2025</option>
        <option value="2024">2024</option>
        <option value="2023">2023</option>
        <option value="2022">2022</option>
      </select>

      <button id="markerBtn" class="active">Markers</button>
      <button id="heatBtn">Heatmap</button>
      <button id="densityBtn">Neighbourhoods</button>

      <span class="counter" id="counter">Events displayed: 0</span>
    </div>

    <div id="map"></div>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
  <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
  <script src="map.js"></script>
</body>
</html>
