<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #0b0b0b;
      color: white;
    }

    .content {
      padding: 30px;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    p {
      color: #ccc;
      max-width: 850px;
      line-height: 1.6;
    }

    .controls {
      margin-top: 20px;
      display: flex;
      gap: 15px;
      align-items: center;
      flex-wrap: wrap;
    }

    select, button {
      padding: 8px 12px;
      background: #111;
      color: white;
      border: 1px solid #333;
      cursor: pointer;
    }

    .active {
      background: #c1121f;
      border-color: #c1121f;
    }

    .counter {
      color: #ccc;
      font-size: 0.95rem;
    }

    #map {
      height: 650px;
      margin-top: 20px;
      border: 1px solid #333;
    }

    .popup-card {
      font-family: Arial, sans-serif;
      color: #111;
      max-width: 320px;
    }

    .popup-title {
      font-weight: bold;
      font-size: 14px;
      line-height: 1.35;
      margin-bottom: 8px;
      color: #111;
    }

    .popup-row {
      font-size: 13px;
      margin-bottom: 5px;
      color: #333;
    }

    .popup-label {
      font-weight: bold;
      color: #111;
    }

    .popup-source {
      margin-top: 8px;
      padding-top: 6px;
      border-top: 1px solid #ddd;
      font-size: 12px;
      color: #555;
      line-height: 1.35;
    }
  </style>
</head>

<body>

<div class="content">
  <h1>Interactive Map</h1>
  <p>
    Explore georeferenced events of criminal violence. Use the controls to switch
    between clustered event markers, heatmap concentration, and neighbourhood-level density.
  </p>

  <div class="controls">
    <label for="yearFilter">Select Year:</label>
    <select id="yearFilter">
      <option value="all">All Years</option>
      <option value="2025">2025</option>
      <option value="2024">2024</option>
      <option value="2023">2023</option>
      <option value="2022">2022</option>
    </select>

    <button id="markerBtn" class="active">Markers</button>
    <button id="heatBtn">Heatmap</button>
    <button id="densityBtn">Neighbourhoods</button>

    <span class="counter" id="counter">Events displayed: 0</span>
  </div>

  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<script>
  var map = L.map('map').setView([-32.95, -60.66], 11);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  var markerCluster = L.markerClusterGroup({
    spiderfyOnMaxZoom: false,
    zoomToBoundsOnClick: true,
    showCoverageOnHover: false,
    maxClusterRadius: 45
  });

  var heatLayer = L.heatLayer([], {
    radius: 22,
    blur: 14,
    maxZoom: 14,
    minOpacity: 0.3,
    gradient: {
      0.20: "blue",
      0.40: "lime",
      0.60: "yellow",
      0.80: "orange",
      1.00: "red"
    }
  });

  var barriosLayer = null;
  var allData = [];
  var barriosData = null;
  var mode = "markers";

  map.addLayer(markerCluster);

  function valueOrNA(value) {
    if (value === null || value === undefined || value === "") {
      return "N/A";
    }
    return value;
  }

  function buildEventPopup(event) {
    return `
      <div class="popup-card">
        <div class="popup-title">${valueOrNA(event.source_headline || event.description)}</div>

        <div class="popup-row"><span class="popup-label">Event ID:</span> ${valueOrNA(event.event_id)}</div>
        <div class="popup-row"><span class="popup-label">Date:</span> ${valueOrNA(event.date)}</div>
        <div class="popup-row"><span class="popup-label">Year:</span> ${valueOrNA(event.year)}</div>
        <div class="popup-row"><span class="popup-label">Location:</span> ${valueOrNA(event.location)}</div>
        <div class="popup-row"><span class="popup-label">Dyad:</span> ${valueOrNA(event.dyad)}</div>
        <div class="popup-row"><span class="popup-label">Type of violence:</span> ${valueOrNA(event.type)}</div>
        <div class="popup-row"><span class="popup-label">Fatalities:</span> ${valueOrNA(event.fatalities)}</div>
        <div class="popup-row"><span class="popup-label">Civilian deaths:</span> ${valueOrNA(event.deaths_civilians)}</div>

        <div class="popup-source">
          <span class="popup-label">Source:</span> ${valueOrNA(event.source)}
        </div>
      </div>
    `;
  }

  function getColor(count) {
    return count > 30 ? '#800026' :
           count > 20 ? '#BD0026' :
           count > 10 ? '#E31A1C' :
           count > 5  ? '#FC4E2A' :
           count > 2  ? '#FD8D3C' :
           count > 0  ? '#FEB24C' :
                         '#222';
  }

  function inside(point, geometry) {
    if (!geometry) return false;

    if (geometry.type === "Polygon") {
      return pointInPolygon(point, geometry.coordinates[0]);
    }

    if (geometry.type === "MultiPolygon") {
      return geometry.coordinates.some(function(poly) {
        return pointInPolygon(point, poly[0]);
      });
    }

    return false;
  }

  function pointInPolygon(point, polygon) {
    var x = point[0], y = point[1];
    var isInside = false;

    for (var i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
      var xi = polygon[i][0], yi = polygon[i][1];
      var xj = polygon[j][0], yj = polygon[j][1];

      var intersect = ((yi > y) !== (yj > y)) &&
        (x < (xj - xi) * (y - yi) / (yj - yi) + xi);

      if (intersect) isInside = !isInside;
    }

    return isInside;
  }

  function getBarrioName(feature) {
    return feature.properties.BARRIO ||
           feature.properties.barrio ||
           feature.properties.NOMBRE ||
           feature.properties.nombre ||
           feature.properties.name ||
           "Unnamed neighbourhood";
  }

  function clearLayers() {
    markerCluster.clearLayers();

    if (map.hasLayer(markerCluster)) {
      map.removeLayer(markerCluster);
    }

    if (map.hasLayer(heatLayer)) {
      map.removeLayer(heatLayer);
    }

    if (barriosLayer && map.hasLayer(barriosLayer)) {
      map.removeLayer(barriosLayer);
    }
  }

  function getFilteredEvents(year) {
    return allData.filter(function(event) {
      var lat = Number(event.lat);
      var lng = Number(event.lng);

      if (!lat || !lng || !event.year) return false;

      return year === "all" || String(event.year) === String(year);
    });
  }

  function loadMarkers(events) {
    events.forEach(function(event) {
      var marker = L.marker([Number(event.lat), Number(event.lng)])
        .bindPopup(buildEventPopup(event));

      markerCluster.addLayer(marker);
    });

    map.addLayer(markerCluster);
  }

  function loadHeat(events) {
    var points = events.map(function(event) {
      var fatalities = Number(event.fatalities) || 1;
      return [Number(event.lat), Number(event.lng), Math.min(fatalities, 3)];
    });

    heatLayer.setLatLngs(points);
    map.addLayer(heatLayer);
  }

  function loadDensity(events) {
    if (!barriosData) return;

    var counts = {};

    barriosData.features.forEach(function(feature) {
      counts[getBarrioName(feature)] = 0;
    });

    events.forEach(function(event) {
      var point = [Number(event.lng), Number(event.lat)];

      barriosData.features.forEach(function(feature) {
        if (inside(point, feature.geometry)) {
          counts[getBarrioName(feature)]++;
        }
      });
    });

    barriosLayer = L.geoJSON(barriosData, {
      style: function(feature) {
        var name = getBarrioName(feature);
        var count = counts[name] || 0;

        return {
          fillColor: getColor(count),
          weight: 1,
          color: "#444",
          fillOpacity: count > 0 ? 0.72 : 0.18
        };
      },
      onEachFeature: function(feature, layer) {
        var name = getBarrioName(feature);
        var count = counts[name] || 0;

        layer.bindPopup(`
          <div class="popup-card">
            <div class="popup-title">${name}</div>
            <div class="popup-row"><span class="popup-label">Events:</span> ${count}</div>
          </div>
        `);
      }
    });

    map.addLayer(barriosLayer);
  }

  function updateMap() {
    var year = document.getElementById("yearFilter").value;
    var events = getFilteredEvents(year);

    clearLayers();

    if (mode === "markers") {
      loadMarkers(events);
    }

    if (mode === "heat") {
      loadHeat(events);
    }

    if (mode === "density") {
      loadDensity(events);
    }

    document.getElementById("counter").innerText = "Events displayed: " + events.length;
  }

  fetch("data.json")
    .then(function(response) { return response.json(); })
    .then(function(data) {
      allData = data;
      updateMap();
    });

  fetch("barrios.geojson")
    .then(function(response) { return response.json(); })
    .then(function(data) {
      barriosData = data;
    });

  document.getElementById("yearFilter").addEventListener("change", updateMap);

  document.getElementById("markerBtn").addEventListener("click", function() {
    mode = "markers";
    this.classList.add("active");
    document.getElementById("heatBtn").classList.remove("active");
    document.getElementById("densityBtn").classList.remove("active");
    updateMap();
  });

  document.getElementById("heatBtn").addEventListener("click", function() {
    mode = "heat";
    this.classList.add("active");
    document.getElementById("markerBtn").classList.remove("active");
    document.getElementById("densityBtn").classList.remove("active");
    updateMap();
  });

  document.getElementById("densityBtn").addEventListener("click", function() {
    mode = "density";
    this.classList.add("active");
    document.getElementById("markerBtn").classList.remove("active");
    document.getElementById("heatBtn").classList.remove("active");
    updateMap();
  });
</script>

</body>
</html>
