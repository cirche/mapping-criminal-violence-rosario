<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Map</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="site.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />
  <link rel="stylesheet" href="map.css" />
</head>

<body>

  <nav class="navbar">
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="map.html" class="active">Interactive Map</a></li>
      <li><a href="data.html">Data</a></li>
      <li><a href="methodology.html">Methodology</a></li>
      <li><a href="rosario.html">Rosario Analysis</a></li>
      <li><a href="about.html">Research Profile</a></li>
    </ul>
  </nav>

  <header class="page-hero">
    <div class="page-hero-inner">
      <h1>Interactive Map</h1>
      <p class="lede">Explore georeferenced events of criminal violence in Rosario.</p>
    </div>
  </header>

  <div class="content">

    <div class="controls">
      <select id="yearFilter">
        <option value="all">All Years</option>
        <option value="2025">2025</option>
        <option value="2024">2024</option>
        <option value="2023">2023</option>
        <option value="2022">2022</option>
      </select>

      <button id="markerBtn" class="active">Markers</button>
      <button id="heatBtn">Heatmap</button>
      <button id="densityBtn">Neighbourhoods</button>

      <span class="counter" id="counter">Events displayed: 0</span>
    </div>

    <div id="map"></div>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
  <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
  <script src="map.js"></script>
</body>
</html>
