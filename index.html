<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mapping Criminal Violence in Rosario</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #0b0b0b;
      color: white;
    }

    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9));
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 20px;
    }

    p {
      font-size: 1.2rem;
      max-width: 600px;
      color: #ccc;
    }

    .btn {
      margin-top: 30px;
      padding: 12px 24px;
      background-color: #c1121f;
      color: white;
      text-decoration: none;
      font-weight: bold;
      border-radius: 4px;
    }

    .btn:hover {
      background-color: #a10f1a;
    }

    #map {
      height: 500px;
      width: 100%;
    }
  </style>
</head>

<body>
  <!-- HERO -->
  <div class="hero">
    <h1>Mapping Criminal Violence in Rosario</h1>
    <p>
      A data-driven analysis of urban violence, drug trafficking, 
      and criminal governance in Argentina.
    </p>
    <a href="#map" class="btn">Explore the Map</a>
  </div>

  <!-- MAP -->
  <div id="map"></div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script>
    var map = L.map('map').setView([-32.95, -60.66], 12);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // DEMO markers
    L.marker([-32.95, -60.66]).addTo(map)
      .bindPopup("Sample event in Rosario")
      .openPopup();

    L.marker([-32.97, -60.64]).addTo(map)
      .bindPopup("Another event");
  </script>
</body>
</html>
